<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Onde Tem Samba</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<style>
@import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap');
*{box-sizing:border-box;margin:0;padding:0;}
html,body{width:100%;height:100%;background:#0D0A07;font-family:'Space Grotesk',sans-serif;overflow:hidden;}

#wrap{position:relative;width:100%;height:100vh;overflow:hidden;background:#0D0A07;}

/* scanlines overlay */
#wrap::before{
  content:'';position:absolute;inset:0;z-index:800;pointer-events:none;
  background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,.05) 2px,rgba(0,0,0,.05) 4px);
}

/* MAP */
#map{position:absolute;inset:0;z-index:1;width:100%;height:100%;}
.leaflet-container{background:#0D0A07!important;}
.leaflet-tile-pane{filter:grayscale(100%) brightness(32%) sepia(45%);}

/* TOPBAR — transparente, sem borda */
#topbar{
  position:absolute;top:16px;left:16px;right:16px;
  z-index:900;
  background:rgba(13,10,7,.55);
  backdrop-filter:blur(10px);
  -webkit-backdrop-filter:blur(10px);
  border:none;
  border-radius:10px;
  padding:0 16px;
  height:46px;
  display:flex;align-items:center;gap:0;
}

/* Brand */
.brand{display:flex;align-items:center;gap:8px;flex-shrink:0;padding-right:16px;}
.brand-dot{
  width:24px;height:24px;border-radius:50%;background:#E8872A;
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 0 10px rgba(232,135,42,.55);flex-shrink:0;
}
.brand-dot svg{width:12px;height:12px;fill:#0D0A07;}
.brand-name{font-size:13px;font-weight:600;color:#F4EBD8;letter-spacing:.03em;white-space:nowrap;}
.brand-name em{color:#E8872A;font-style:normal;}

/* Pipe */
.pipe{width:1px;height:20px;background:rgba(232,135,42,.28);flex-shrink:0;}

/* Search wrapper */
.search-wrap{
  flex:1;display:flex;align-items:center;gap:7px;padding:0 12px;
}
.search-wrap svg{width:14px;height:14px;stroke:rgba(244,235,216,.38);flex-shrink:0;}
#searchbox{
  flex:1;background:transparent;border:none;outline:none;
  font-size:12px;color:#F4EBD8;font-family:'Space Grotesk',sans-serif;letter-spacing:.02em;
}
#searchbox::placeholder{color:rgba(244,235,216,.3);}

/* Filters */
#filters{display:flex;align-items:center;gap:5px;padding-left:14px;}
.fb{
  background:transparent;
  border:1px solid rgba(232,135,42,.25);
  color:rgba(244,235,216,.5);
  padding:4px 13px;border-radius:20px;font-size:11px;
  cursor:pointer;font-family:'Space Grotesk',sans-serif;
  white-space:nowrap;transition:all .15s;letter-spacing:.04em;
}
.fb:hover{border-color:rgba(232,135,42,.6);color:#F4EBD8;}
.fb.on{
  background:#E8872A;color:#0D0A07;border-color:#E8872A;font-weight:700;
  box-shadow:0 0 10px rgba(232,135,42,.4);
}

/* PIN */
.mpin-head{
  width:32px;height:32px;
  border-radius:50% 50% 50% 0;transform:rotate(-45deg);
  background:#E8872A;
  border:2px solid rgba(255,255,255,.5);
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 0 14px rgba(232,135,42,.5),0 2px 6px rgba(0,0,0,.5);
  cursor:pointer;transition:box-shadow .15s;
}
.mpin-head:hover{box-shadow:0 0 24px rgba(232,135,42,.75),0 2px 8px rgba(0,0,0,.5);}
.mpin-icon{transform:rotate(45deg);font-size:13px;line-height:1;}

/* OVERLAY */
#overlay{
  position:absolute;inset:0;z-index:950;
  background:rgba(0,0,0,.5);
  opacity:0;pointer-events:none;transition:opacity .22s;
}
#overlay.on{opacity:1;pointer-events:all;}

/* DETAIL BOX */
#detail{
  position:absolute;top:50%;left:50%;
  transform:translate(-50%,-50%) scale(.88);
  z-index:1000;width:310px;
  background:rgba(16,9,3,.97);
  border:1px solid rgba(232,135,42,.4);
  border-radius:14px;overflow:hidden;
  box-shadow:0 0 48px rgba(232,135,42,.18),0 20px 52px rgba(0,0,0,.75);
  opacity:0;pointer-events:none;
  transition:opacity .22s,transform .22s cubic-bezier(.34,1.36,.64,1);
}
#detail.open{opacity:1;pointer-events:all;transform:translate(-50%,-50%) scale(1);}

/* image */
#detail-img-wrap{position:relative;width:100%;height:158px;overflow:hidden;}
#detail-img{width:100%;height:158px;object-fit:cover;display:block;filter:saturate(65%) brightness(82%);}
#detail-img-placeholder{width:100%;height:158px;background:linear-gradient(135deg,#2A1005,#5C3214);display:flex;align-items:center;justify-content:center;font-size:44px;}
/* scanline on image */
#detail-img-wrap::after{
  content:'';position:absolute;inset:0;pointer-events:none;z-index:2;
  background:repeating-linear-gradient(0deg,transparent,transparent 3px,rgba(0,0,0,.09) 3px,rgba(0,0,0,.09) 4px);
}
/* fade bottom of image */
#detail-img-wrap::before{
  content:'';position:absolute;bottom:0;left:0;right:0;height:52px;z-index:3;pointer-events:none;
  background:linear-gradient(transparent,rgba(16,9,3,.97));
}
/* tags over image */
#detail-tags{position:absolute;bottom:9px;left:13px;z-index:4;display:flex;gap:5px;flex-wrap:wrap;}
.dtag{font-size:10px;padding:2px 8px;border-radius:8px;background:#E8872A;color:#0D0A07;font-weight:700;letter-spacing:.04em;box-shadow:0 0 7px rgba(232,135,42,.5);}
/* close btn */
#detail-close{
  position:absolute;top:10px;right:10px;z-index:5;
  width:26px;height:26px;border-radius:50%;
  background:rgba(13,10,7,.72);border:1px solid rgba(232,135,42,.3);
  cursor:pointer;display:flex;align-items:center;justify-content:center;
  transition:all .15s;
}
#detail-close:hover{background:rgba(232,135,42,.2);border-color:#E8872A;}
#detail-close svg{width:12px;height:12px;stroke:#F4EBD8;stroke-width:2;fill:none;}

/* body */
#detail-body{padding:15px 16px 15px;}
#detail-header{display:flex;justify-content:space-between;align-items:flex-start;gap:8px;margin-bottom:11px;}
#detail-name{font-size:14px;font-weight:700;color:#F4EBD8;line-height:1.25;letter-spacing:.01em;}
#detail-badge{
  font-size:10px;padding:3px 8px;border-radius:8px;flex-shrink:0;margin-top:2px;
  background:rgba(232,135,42,.14);color:#E8872A;
  border:1px solid rgba(232,135,42,.3);font-weight:600;letter-spacing:.05em;white-space:nowrap;
}
#detail-meta{display:grid;grid-template-columns:1fr 1fr;gap:7px 10px;margin-bottom:14px;}
.dm{display:flex;align-items:flex-start;gap:6px;font-size:11px;color:rgba(244,235,216,.45);}
.dm svg{width:13px;height:13px;stroke:#E8872A;fill:none;flex-shrink:0;margin-top:1px;}
.dm span{color:rgba(244,235,216,.8);line-height:1.3;}
#detail-hr{height:1px;background:rgba(232,135,42,.14);margin-bottom:13px;}
#detail-btn{
  display:block;width:100%;padding:10px;
  background:#E8872A;color:#0D0A07;border:none;border-radius:8px;
  font-size:11px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;
  cursor:pointer;font-family:'Space Grotesk',sans-serif;
  box-shadow:0 0 16px rgba(232,135,42,.35);transition:all .15s;
}
#detail-btn:hover{background:#F5A94A;box-shadow:0 0 24px rgba(232,135,42,.55);}
</style>
</head>
<body>
<div id="wrap">
  <div id="map"></div>
  <div id="overlay" onclick="closeDetail()"></div>

  <!-- TOPBAR -->
  <div id="topbar">
    <div class="brand">
      <div class="brand-dot">
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5s1.12-2.5 2.5-2.5 2.5 1.12 2.5 2.5-1.12 2.5-2.5 2.5z"/></svg>
      </div>
      <div class="brand-name">onde tem <em>samba</em></div>
    </div>
    <div class="pipe"></div>
    <div class="search-wrap">
      <svg viewBox="0 0 24 24" fill="none" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" xmlns="http://www.w3.org/2000/svg"><circle cx="11" cy="11" r="7"/><line x1="16.5" y1="16.5" x2="22" y2="22"/></svg>
      <input id="searchbox" type="text" placeholder="buscar evento ou bairro..." oninput="applyF()"/>
    </div>
    <div class="pipe"></div>
    <div id="filters">
      <button class="fb on" onclick="setF('todos',this)">Todos</button>
      <button class="fb" onclick="setF('hoje',this)">Hoje</button>
      <button class="fb" onclick="setF('fds',this)">Fim de semana</button>
    </div>
  </div>

  <!-- DETAIL BOX -->
  <div id="detail">
    <div id="detail-img-wrap">
      <div id="detail-img-slot"></div>
      <div id="detail-tags"></div>
      <button id="detail-close" onclick="closeDetail()">
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>
    <div id="detail-body">
      <div id="detail-header">
        <div id="detail-name"></div>
        <span id="detail-badge"></span>
      </div>
      <div id="detail-meta"></div>
      <div id="detail-hr"></div>
      <button id="detail-btn">Tenho interesse</button>
    </div>
  </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
const today = new Date();
const add = n => { const d=new Date(today); d.setDate(d.getDate()+n); return d.toISOString().split('T')[0]; };

const EV = [
  {id:1,nome:"Pagode no Coreto",local:"Praça Coronel Almeida",bairro:"Centro",lat:-23.2155,lng:-47.5270,data:add(0),hora:"19h",rec:"Toda sexta",ingresso:"Gratuito",estilos:["pagode"],img:"https://images.unsplash.com/photo-1533174072545-7a4b6ad7a6c3?w=620&q=80"},
  {id:2,nome:"Roda de samba do Léo",local:"Bar do Léo",bairro:"Centro",lat:-23.2142,lng:-47.5258,data:add(1),hora:"21h",rec:"Todo sábado",ingresso:"R$ 15",estilos:["raiz","pagode"],img:"https://images.unsplash.com/photo-1501386761578-eaa54b492c24?w=620&q=80"},
  {id:3,nome:"Samba às margens do Tietê",local:"Orla do Rio Tietê",bairro:"Beira Rio",lat:-23.2098,lng:-47.5312,data:add(2),hora:"17h",rec:"Todo domingo",ingresso:"Gratuito",estilos:["raiz"],img:"https://images.unsplash.com/photo-1516450360452-9312f5e86fc7?w=620&q=80"},
  {id:4,nome:"Partido alto na Vila",local:"Associação Recreativa",bairro:"Vila Maria",lat:-23.2178,lng:-47.5220,data:add(3),hora:"20h",rec:"Quinzenal",ingresso:"R$ 10",estilos:["partido alto"],img:"https://images.unsplash.com/photo-1493225457124-a3eb161ffa5f?w=620&q=80"},
  {id:5,nome:"Pagode Monções",local:"Espaço das Monções",bairro:"Jd. Monções",lat:-23.2205,lng:-47.5185,data:add(5),hora:"20h30",rec:"Semanal",ingresso:"R$ 20",estilos:["pagode"],img:"https://images.unsplash.com/photo-1533174072545-7a4b6ad7a6c3?w=620&q=80"},
  {id:6,nome:"Noite do cavaquinho",local:"Boteco do Tião",bairro:"Jd. Martelli",lat:-23.2130,lng:-47.5295,data:add(0),hora:"20h",rec:"Toda quinta",ingresso:"Gratuito",estilos:["raiz"],img:"https://images.unsplash.com/photo-1501386761578-eaa54b492c24?w=620&q=80"},
  {id:7,nome:"Samba de raiz no Bambuzal",local:"Chácara Bambuzal",bairro:"Bambu",lat:-23.2240,lng:-47.5148,data:add(1),hora:"18h",rec:"Único",ingresso:"R$ 25",estilos:["raiz"],img:"https://images.unsplash.com/photo-1516450360452-9312f5e86fc7?w=620&q=80"},
];

function dayType(ds){
  const d=new Date(ds+'T12:00:00'),diff=Math.round((d-today)/86400000),dow=d.getDay();
  if(diff===0)return'hoje'; if(dow===0||dow===6)return'fds'; return'sem';
}
function dayLabel(ds){
  if(dayType(ds)==='hoje')return'HOJE';
  const d=new Date(ds+'T12:00:00');
  return d.toLocaleDateString('pt-BR',{weekday:'short',day:'numeric',month:'short'}).toUpperCase();
}
function makeIcon(faded){
  const op=faded?0.13:1;
  const html=`<div style="opacity:${op};display:flex;align-items:center;justify-content:center;">
    <div class="mpin-head"><span class="mpin-icon">🎵</span></div>
  </div>`;
  return L.divIcon({html,className:'',iconSize:[32,32],iconAnchor:[16,30],popupAnchor:[0,-32]});
}

let curF='todos', curQ='';
const layer=L.layerGroup();
const map=L.map('map',{center:[-23.2165,-47.5238],zoom:14,zoomControl:true});
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{
  maxZoom:19,attribution:'© OpenStreetMap contributors',crossOrigin:true
}).addTo(map);
layer.addTo(map);

function filtered(){
  return EV.filter(ev=>{
    if(curF==='hoje'&&dayType(ev.data)!=='hoje')return false;
    if(curF==='fds'&&dayType(ev.data)!=='fds')return false;
    if(curQ){const q=curQ.toLowerCase();
      if(!ev.nome.toLowerCase().includes(q)&&!ev.bairro.toLowerCase().includes(q))return false;}
    return true;
  });
}

function showDetail(ev){
  document.getElementById('detail-img-slot').innerHTML=
    `<img id="detail-img" src="${ev.img}" alt="${ev.nome}" onerror="this.outerHTML='<div id=detail-img-placeholder>🎵</div>'"/>`;
  document.getElementById('detail-tags').innerHTML=ev.estilos.map(s=>`<span class="dtag">${s}</span>`).join('');
  document.getElementById('detail-name').textContent=ev.nome;
  document.getElementById('detail-badge').textContent=dayLabel(ev.data);
  document.getElementById('detail-meta').innerHTML=`
    <div class="dm"><svg viewBox="0 0 24 24" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg><span>${ev.local}</span></div>
    <div class="dm"><svg viewBox="0 0 24 24" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 10c0 7-9 13-9 13S3 17 3 10a9 9 0 0118 0z"/><circle cx="12" cy="10" r="3"/></svg><span>${ev.bairro}</span></div>
    <div class="dm"><svg viewBox="0 0 24 24" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg><span>${ev.hora} · ${ev.rec}</span></div>
    <div class="dm"><svg viewBox="0 0 24 24" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2 9a3 3 0 010 6v2a2 2 0 002 2h16a2 2 0 002-2v-2a3 3 0 010-6V7a2 2 0 00-2-2H4a2 2 0 00-2 2v2z"/></svg><span>${ev.ingresso}</span></div>`;
  document.getElementById('detail-btn').onclick=()=>alert('Interesse registrado em: '+ev.nome);
  document.getElementById('detail').classList.add('open');
  document.getElementById('overlay').classList.add('on');
}

function closeDetail(){
  document.getElementById('detail').classList.remove('open');
  document.getElementById('overlay').classList.remove('on');
}

function render(){
  const ids=new Set(filtered().map(e=>e.id));
  layer.clearLayers();
  EV.forEach(ev=>{
    const m=L.marker([ev.lat,ev.lng],{icon:makeIcon(!ids.has(ev.id))});
    if(ids.has(ev.id)) m.on('click',()=>{ map.panTo([ev.lat,ev.lng],{animate:true}); showDetail(ev); });
    m.addTo(layer);
  });
}

function setF(f,btn){curF=f;document.querySelectorAll('#filters .fb').forEach(b=>b.classList.remove('on'));btn.classList.add('on');closeDetail();render();}
function applyF(){curQ=document.getElementById('searchbox').value;render();}

render();
</script>
</body>
</html>
